name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run generate
      # Run core E2E tests (no network dependency)
      - run: npx playwright test e2e/table.spec.ts
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

  e2e-datasets:
    runs-on: ubuntu-latest
    # Don't block PRs on HuggingFace availability
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run generate
      # HuggingFace dataset tests (requires network access)
      - run: npx playwright test e2e/datasets.spec.ts --timeout 60000
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-datasets-report
          path: test-results/
          retention-days: 7

  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run generate
      - name: Run perf benchmarks
        run: npx playwright test e2e/perf.spec.ts 2>&1 | tee perf-output.txt
      - name: Extract perf JSON
        run: |
          node -e "
            const fs = require('fs');
            const log = fs.readFileSync('perf-output.txt', 'utf8');
            const match = log.match(/Results JSON:\s*\n([\s\S]*?\n\])/);
            if (match) {
              const results = JSON.parse(match[1]);
              const out = { timestamp: new Date().toISOString(), commit: '${{ github.sha }}', results };
              fs.writeFileSync('perf-results.json', JSON.stringify(out, null, 2));
            }
          "
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-results
          path: perf-results.json
          retention-days: 90
